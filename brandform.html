<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Order NOIR STREET</title>
  <link rel="stylesheet" href="form.css">
</head>

<body>
<div class="form-container">
  <h1>Shop Now</h1>

  <form>
    <div>
    <label>Mr.</label>
    <input type="radio" name="title">

    <label>Mrs.</label>
    <input type="radio" name="title">

     <label>Miss</label>
    <input type="radio" name="title">
    </div>

    <label>Full Name</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Phone Number</label>
    <input type="number" required>

    <label>Address</label>
    <textarea required></textarea>

    <label>Select Item</label>
    <select>
      <option>Concrete Grey Jeans</option>
      <option>Midnight Blue Jeans</option>
      <option>Static Graphic Hoodie</option>
      <option>Noise Graphic Hoodie</option>
      <option>Y2K Chrome Hoodie</option>
      <option>Mono Fitted Tee</option>
      <option>Brown Casual Tee</option>
      <option>Button down Fitted Tee</option>
    </select>

    <label>Payment Method</label>
    <select>
      <option>Cash on Delivery</option>
      <option>Card</option>
      <option>EasyPaisa / JazzCash</option>
    </select>
    <button type="submit">Finish Order</button>
  </form>
</div>

</body>
</html>
